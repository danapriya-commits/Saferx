{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block full_content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 p-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent tracking-tight">SAFERX</h1>
            <p class="text-gray-500 mt-2 font-medium">Secure Administrator Portal</p>
        </div>
        
        <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
            <div class="p-8">
                <h2 class="text-2xl font-bold text-gray-900 mb-6">Welcome Back</h2>
                
                {% if error %}
                <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg mb-6 flex items-center gap-3 text-sm font-medium">
                    <i class="fas fa-exclamation-circle text-red-500"></i>
                    {{ error }}
                </div>
                {% endif %}
                
                <form action="/admin/login" method="POST" class="space-y-5">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1.5">Email Address</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-envelope text-gray-400"></i>
                            </div>
                            <input type="email" name="email" required 
                                   class="pl-11 w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-600 focus:border-transparent outline-none transition-all placeholder-gray-400 text-gray-900 font-medium" 
                                   placeholder="admin@saferx.com">
                        </div>
                    </div>
                    
                    <div>
                        <div class="flex justify-between items-center mb-1.5">
                            <label class="block text-sm font-bold text-gray-700">Password</label>
                        </div>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-lock text-gray-400"></i>
                            </div>
                            <input type="password" name="password" required 
                                   class="pl-11 w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-600 focus:border-transparent outline-none transition-all placeholder-gray-400 text-gray-900 font-medium" 
                                   placeholder="••••••••">
                        </div>
                    </div>
                    
                    <button type="submit" class="w-full flex justify-center items-center py-3.5 px-4 border border-transparent rounded-xl shadow-sm shadow-indigo-600/30 text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 mt-2">
                        <i class="fas fa-sign-in-alt mr-2"></i> Log In to Dashboard
                    </button>
                </form>
            </div>
            <div class="bg-gray-50 px-8 py-5 border-t border-gray-100 text-center">
                <p class="text-xs text-gray-500">Protected by advanced encryption. Unauthorized access is strictly prohibited.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
