<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SafeRx Admin{% endblock %} - SafeRx Medical Supplies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    {% if admin %}
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-gray-200 shadow-sm flex flex-col hidden md:flex">
            <div class="p-6 border-b border-gray-100 flex justify-center items-center">
                <div class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent tracking-tight">SAFERX</div>
            </div>
            
            <nav class="flex-1 p-4 space-y-1.5 overflow-y-auto">
                <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3 mt-4 px-3">Management</div>
                
                <a href="/admin/dashboard" class="flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-colors {% if request.url.path == '/admin/dashboard' %}bg-indigo-50 text-indigo-700{% else %}text-gray-600 hover:bg-gray-50 hover:text-gray-900{% endif %}">
                    <i class="fas fa-home w-5 text-center mr-2 {% if request.url.path == '/admin/dashboard' %}text-indigo-600{% endif %}"></i> Dashboard
                </a>
                
                <a href="/admin/equipment" class="flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-colors {% if request.url.path.startswith('/admin/equipment') %}bg-indigo-50 text-indigo-700{% else %}text-gray-600 hover:bg-gray-50 hover:text-gray-900{% endif %}">
                    <i class="fas fa-stethoscope w-5 text-center mr-2 {% if request.url.path.startswith('/admin/equipment') %}text-indigo-600{% endif %}"></i> Medical Equipment
                </a>

                <a href="/admin/knowledge-centre" class="flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-colors {% if request.url.path.startswith('/admin/knowledge-centre') %}bg-indigo-50 text-indigo-700{% else %}text-gray-600 hover:bg-gray-50 hover:text-gray-900{% endif %}">
                    <i class="fas fa-book-medical w-5 text-center mr-2 {% if request.url.path.startswith('/admin/knowledge-centre') %}text-indigo-600{% endif %}"></i> Knowledge Centre
                </a>


            </nav>
            
            <div class="p-4 border-t border-gray-100">
                <div class="flex items-center justify-between mb-4 px-2">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold text-sm border border-indigo-200">
                            {{ admin.email[0] | upper }}
                        </div>
                        <div class="text-xs">
                            <p class="font-bold text-gray-900">{{ admin.email.split('@')[0] }}</p>
                            <p class="text-gray-500">Administrator</p>
                        </div>
                    </div>
                </div>
                <form action="/admin/logout" method="GET">
                    <button type="submit" class="w-full flex justify-center items-center px-4 py-2 text-sm font-medium text-red-600 bg-red-50 hover:bg-red-100 rounded-lg transition-colors">
                        <i class="fas fa-sign-out-alt mr-2"></i> Log Out
                    </button>
                </form>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-screen overflow-hidden bg-gray-50/50">
            <!-- Mobile Header -->
            <header class="md:hidden bg-white border-b border-gray-200 p-4 flex justify-between items-center shadow-sm">
                <div class="text-xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">SAFERX</div>
                <button class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-bars text-xl"></i>
                </button>
            </header>

            <div class="flex-1 overflow-y-auto p-6 md:p-8 lg:p-10">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
    {% else %}
        {% block full_content %}{% endblock %}
    {% endif %}

    {% block scripts %}{% endblock %}
</body>
</html>
